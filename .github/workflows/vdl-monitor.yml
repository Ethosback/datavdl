name: VDL Monitor

on:
  workflow_dispatch:
  schedule:
    - cron: "17 13 * * *"
      timezone: "Europe/Paris"

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run VDL monitor
        env:
          KEYBERT_MODEL: ${{ vars.KEYBERT_MODEL || 'all-MiniLM-L6-v2' }}
          SITEMAP_TIMEOUT: ${{ vars.SITEMAP_TIMEOUT || '12' }}
          PAGE_TIMEOUT: ${{ vars.PAGE_TIMEOUT || '20' }}
          HTTP_RETRIES: ${{ vars.HTTP_RETRIES || '3' }}
          SITEMAP_WORKERS: ${{ vars.SITEMAP_WORKERS || '32' }}
          PAGE_WORKERS: ${{ vars.PAGE_WORKERS || '24' }}
        run: python -u scripts/monitor_vdl.py

      - name: Build dashboard data
        run: python scripts/build_dashboard_data.py

      - name: Commit updated state and dashboard data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data public/data
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "chore: update VDL monitor state"
          git push
