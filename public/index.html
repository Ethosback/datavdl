<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Analyse VDL</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
      href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Roboto:wght@400;500&display=swap"
      rel="stylesheet"
    >
    <style>
      :root {
        --bg: #f8f9fa;
        --surface: #ffffff;
        --border: #e0e0e0;
        --border-light: #f1f3f4;
        --blue: #1a73e8;
        --blue-bg: #e8f0fe;
        --green: #1e8e3e;
        --green-bg: #e6f4ea;
        --yellow: #f9ab00;
        --yellow-bg: #fef7e0;
        --red: #d93025;
        --red-bg: #fce8e6;
        --text: #202124;
        --text-dim: #5f6368;
        --muted: #9aa0a6;
        --shadow: 0 1px 2px rgba(0, 0, 0, 0.08);
        --font-ui: "Google Sans", "Roboto", sans-serif;
        --font-body: "Roboto", sans-serif;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        min-height: 100vh;
        background: var(--bg);
        color: var(--text);
        font-family: var(--font-body);
        font-size: 13px;
      }

      a {
        color: var(--blue);
        text-decoration: none;
      }

      a:hover {
        text-decoration: underline;
      }

      header {
        position: sticky;
        top: 0;
        z-index: 20;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        flex-wrap: wrap;
        min-height: 64px;
        padding: 12px 24px;
        background: var(--surface);
        border-bottom: 1px solid var(--border);
        box-shadow: var(--shadow);
      }

      .header-left h1 {
        display: flex;
        align-items: center;
        gap: 10px;
        font-family: var(--font-ui);
        font-size: 18px;
        font-weight: 500;
      }

      .header-left h1::before {
        content: "";
        width: 20px;
        height: 20px;
        border-radius: 4px;
        background: var(--blue);
      }

      .header-left p {
        margin-top: 2px;
        margin-left: 30px;
        color: var(--text-dim);
        font-size: 12px;
      }

      .status-pill {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 5px 12px;
        border-radius: 20px;
        background: var(--green-bg);
        color: var(--green);
        font-family: var(--font-ui);
        font-size: 12px;
      }

      .status-pill::before {
        content: "";
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--green);
        animation: pulse 2s infinite;
      }

      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.3; }
      }

      .page {
        width: min(1600px, calc(100% - 32px));
        margin: 0 auto;
        padding: 16px 0 48px;
      }

      .stats-bar {
        display: flex;
        gap: 16px;
        flex-wrap: wrap;
        margin-bottom: 16px;
      }

      .stat {
        flex: 1;
        min-width: 150px;
        padding: 16px 20px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 8px;
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.04);
      }

      .stat-label {
        margin-bottom: 8px;
        color: var(--text-dim);
        font-family: var(--font-ui);
        font-size: 12px;
      }

      .stat-value {
        font-family: var(--font-ui);
        font-size: 28px;
        font-weight: 700;
        line-height: 1;
      }

      .stat-value.blue { color: var(--blue); }
      .stat-value.green { color: var(--green); }
      .stat-value.yellow { color: var(--yellow); }
      .stat-value.red { color: var(--red); }

      .filters {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
        padding: 12px 24px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 8px 8px 0 0;
      }

      .filter-group {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .filter-label {
        color: var(--text-dim);
        font-family: var(--font-ui);
        font-size: 12px;
        white-space: nowrap;
      }

      .separator {
        width: 1px;
        height: 28px;
        background: var(--border);
      }

      input,
      select,
      button {
        font: inherit;
      }

      input,
      select {
        padding: 7px 12px;
        border: 1px solid var(--border);
        border-radius: 4px;
        background: var(--surface);
        color: var(--text);
        outline: none;
        transition: border-color 0.15s, box-shadow 0.15s;
      }

      input:focus,
      select:focus {
        border-color: var(--blue);
        box-shadow: 0 0 0 2px rgba(26, 115, 232, 0.15);
      }

      input[type="text"] {
        width: 210px;
      }

      input[type="date"] {
        width: 148px;
      }

      input:disabled {
        color: var(--muted);
        background: #f7f7f7;
        cursor: not-allowed;
      }

      .btn,
      .dl-btn {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 7px 14px;
        border: 1px solid var(--border);
        border-radius: 4px;
        background: var(--surface);
        color: var(--text-dim);
        font-family: var(--font-ui);
        cursor: pointer;
        transition: all 0.15s;
      }

      .btn:hover,
      .dl-btn:hover {
        background: var(--bg);
        border-color: var(--blue);
        color: var(--blue);
      }

      .tabs {
        display: flex;
        gap: 4px;
        padding: 0 24px;
        background: var(--surface);
        border-left: 1px solid var(--border);
        border-right: 1px solid var(--border);
        border-bottom: 1px solid var(--border);
      }

      .tab {
        padding: 14px 16px;
        color: var(--text-dim);
        font-family: var(--font-ui);
        font-size: 13px;
        cursor: pointer;
        border-bottom: 3px solid transparent;
        transition: all 0.15s;
      }

      .tab:hover {
        color: var(--blue);
      }

      .tab.active {
        color: var(--blue);
        border-bottom-color: var(--blue);
        font-weight: 500;
      }

      .panel {
        padding: 20px 24px 24px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-top: 0;
        border-radius: 0 0 8px 8px;
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.04);
      }

      .panel-header {
        display: flex;
        align-items: start;
        justify-content: space-between;
        gap: 16px;
        flex-wrap: wrap;
        margin-bottom: 14px;
      }

      .panel-header h2 {
        font-family: var(--font-ui);
        font-size: 18px;
        font-weight: 500;
      }

      .panel-header p {
        margin-top: 4px;
        color: var(--text-dim);
      }

      .table-toolbar {
        display: flex;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
        padding: 4px 0 12px;
      }

      .toolbar-label {
        color: var(--text-dim);
        font-family: var(--font-ui);
        font-size: 11px;
        white-space: nowrap;
      }

      .col-toggle-bar {
        display: flex;
        align-items: center;
        gap: 6px;
        flex: 1;
        flex-wrap: wrap;
      }

      .col-toggle-btn {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        padding: 3px 10px;
        border: 1px solid var(--border);
        border-radius: 12px;
        background: var(--surface);
        color: var(--text-dim);
        font-family: var(--font-ui);
        font-size: 11px;
        cursor: pointer;
        transition: all 0.15s;
      }

      .col-toggle-btn.hidden {
        color: var(--muted);
        background: var(--border-light);
        text-decoration: line-through;
      }

      .col-toggle-btn:hover {
        border-color: var(--blue);
        color: var(--blue);
      }

      .toolbar-actions {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-left: auto;
      }

      .result-count {
        margin-left: auto;
        color: var(--text-dim);
        font-family: var(--font-ui);
        font-size: 12px;
      }

      .result-count strong {
        color: var(--text);
      }

      .active-filters-bar {
        display: none;
        align-items: center;
        gap: 6px;
        flex-wrap: wrap;
        padding: 0 0 12px;
      }

      .active-filters-bar.visible {
        display: flex;
      }

      .filters-label {
        color: var(--text-dim);
        font-family: var(--font-ui);
        font-size: 11px;
      }

      .filter-pill {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 3px 10px;
        border: 1px solid var(--blue);
        border-radius: 12px;
        background: var(--blue-bg);
        color: var(--blue);
        font-family: var(--font-ui);
        font-size: 11px;
        font-weight: 500;
      }

      .filter-pill-remove {
        border: 0;
        background: none;
        color: var(--blue);
        cursor: pointer;
        font-size: 13px;
        line-height: 1;
      }

      .table-outer {
        position: relative;
        overflow: hidden;
        border: 1px solid var(--border);
        border-radius: 8px;
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.04);
      }

      .table-wrap {
        max-height: 68vh;
        overflow: auto;
        background: var(--surface);
      }

      table {
        width: 100%;
        min-width: 1100px;
        border-collapse: collapse;
      }

      thead tr {
        position: sticky;
        top: 0;
        z-index: 4;
        background: var(--bg);
        border-bottom: 2px solid var(--border);
      }

      th {
        padding: 0;
        border-right: 1px solid var(--border-light);
        background: var(--bg);
        color: var(--text-dim);
        font-family: var(--font-ui);
        font-size: 12px;
        font-weight: 500;
        text-align: left;
        vertical-align: top;
        white-space: nowrap;
      }

      th:last-child {
        border-right: 0;
      }

      th:first-child {
        position: sticky;
        left: 0;
        z-index: 5;
        box-shadow: 2px 0 4px rgba(0, 0, 0, 0.06);
      }

      .th-inner {
        display: flex;
        flex-direction: column;
      }

      .th-sort {
        display: flex;
        align-items: center;
        gap: 4px;
        padding: 10px 12px 6px;
        cursor: pointer;
      }

      .th-sort:hover {
        color: var(--text);
      }

      .sort-arrow {
        opacity: 0.35;
        font-size: 10px;
      }

      th.asc .sort-arrow::after {
        content: " ^";
        color: var(--blue);
        opacity: 1;
      }

      th.desc .sort-arrow::after {
        content: " v";
        color: var(--blue);
        opacity: 1;
      }

      .th-filter-trigger {
        width: 100%;
        padding: 2px 12px 8px;
        border: 0;
        background: none;
        color: var(--muted);
        cursor: pointer;
        font-family: var(--font-ui);
        font-size: 11px;
        text-align: left;
      }

      .th-filter-trigger:hover,
      .th-filter-trigger.active {
        color: var(--blue);
      }

      .filter-indicator {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 16px;
        height: 16px;
        padding: 0 4px;
        border-radius: 8px;
        background: var(--blue);
        color: #fff;
        font-size: 10px;
        font-weight: 600;
      }

      tbody tr {
        border-bottom: 1px solid var(--border-light);
        transition: background 0.1s;
      }

      tbody tr:last-child {
        border-bottom: 0;
      }

      tbody tr:hover {
        background: #f8f9fa;
      }

      td {
        padding: 10px 12px;
        white-space: nowrap;
        vertical-align: middle;
      }

      td:first-child {
        position: sticky;
        left: 0;
        z-index: 2;
        background: var(--surface);
        box-shadow: 2px 0 4px rgba(0, 0, 0, 0.04);
      }

      tbody tr:hover td:first-child {
        background: #f8f9fa;
      }

      .td-url {
        max-width: 320px;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .num {
        text-align: right;
      }

      .muted {
        color: var(--text-dim);
      }

      mark {
        padding: 0 1px;
        border-radius: 2px;
        background: #fff3cd;
        color: var(--text);
      }

      .load-more-wrap {
        display: none;
        padding: 16px 0 4px;
        text-align: center;
      }

      .rows-info {
        padding-bottom: 8px;
        color: var(--text-dim);
        font-family: var(--font-ui);
        font-size: 12px;
      }

      .load-more-btn {
        padding: 8px 24px;
        border: 1px solid var(--border);
        border-radius: 4px;
        background: var(--surface);
        color: var(--blue);
        cursor: pointer;
        font-family: var(--font-ui);
        transition: all 0.15s;
      }

      .load-more-btn:hover {
        border-color: var(--blue);
        background: var(--blue-bg);
      }

      .empty,
      .error-box {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 12px;
        min-height: 220px;
        color: var(--text-dim);
        font-family: var(--font-ui);
        text-align: center;
      }

      .error-box strong {
        color: var(--red);
      }

      #col-filter-dropdown {
        display: none;
        position: fixed;
        z-index: 1000;
        width: 260px;
        overflow: hidden;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--surface);
        box-shadow: 0 4px 24px rgba(0, 0, 0, 0.15);
      }

      #col-filter-dropdown.open {
        display: block;
      }

      .cfd-header {
        padding: 10px 12px 8px;
        border-bottom: 1px solid var(--border-light);
        background: var(--bg);
      }

      .cfd-col-name {
        margin-bottom: 6px;
        color: var(--text-dim);
        font-family: var(--font-ui);
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.6px;
        text-transform: uppercase;
      }

      .cfd-search {
        width: 100%;
        padding: 6px 10px;
        border: 1px solid var(--border);
        border-radius: 4px;
        font-size: 12px;
      }

      .cfd-mode-bar {
        display: flex;
        gap: 4px;
        padding: 8px 12px 0;
      }

      .cfd-mode-btn {
        flex: 1;
        padding: 4px 6px;
        border: 1px solid var(--border);
        border-radius: 4px;
        background: var(--surface);
        color: var(--text-dim);
        cursor: pointer;
        font-family: var(--font-ui);
        font-size: 11px;
        text-align: center;
      }

      .cfd-mode-btn.active {
        border-color: var(--blue);
        background: var(--blue-bg);
        color: var(--blue);
        font-weight: 500;
      }

      .cfd-mode-btn.hidden {
        display: none;
      }

      .cfd-list {
        max-height: 220px;
        overflow-y: auto;
        padding: 4px 0;
      }

      .cfd-item {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 6px 12px;
        cursor: pointer;
        font-size: 12px;
        transition: background 0.1s;
      }

      .cfd-item:hover {
        background: var(--bg);
      }

      .cfd-item input[type="checkbox"] {
        width: 14px;
        height: 14px;
        accent-color: var(--blue);
        cursor: pointer;
        flex-shrink: 0;
      }

      .cfd-item-label {
        flex: 1;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .cfd-item.select-all {
        border-bottom: 1px solid var(--border-light);
        font-weight: 500;
      }

      .cfd-text-input,
      .cfd-range {
        display: none;
        padding: 8px 12px;
      }

      .cfd-text-input.visible {
        display: block;
      }

      .cfd-range.visible {
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .cfd-text-input input,
      .cfd-range input {
        width: 100%;
        padding: 6px 10px;
        border: 1px solid var(--border);
        border-radius: 4px;
        font-size: 12px;
      }

      .cfd-range span {
        color: var(--text-dim);
        font-size: 11px;
        flex-shrink: 0;
      }

      .cfd-footer {
        display: flex;
        gap: 6px;
        padding: 8px 12px;
        border-top: 1px solid var(--border-light);
        background: var(--bg);
      }

      .cfd-footer button {
        flex: 1;
        padding: 5px;
        border: 1px solid var(--border);
        border-radius: 4px;
        background: var(--surface);
        color: var(--text-dim);
        cursor: pointer;
        font-family: var(--font-ui);
        font-size: 11px;
      }

      .cfd-footer button:hover {
        border-color: var(--blue);
        color: var(--blue);
      }

      @media (max-width: 1024px) {
        .page {
          width: min(100% - 20px, 1600px);
        }

        .filters,
        .tabs,
        .panel {
          padding-left: 16px;
          padding-right: 16px;
        }

        input[type="text"] {
          width: 180px;
        }
      }

      @media (max-width: 768px) {
        header {
          padding: 12px 16px;
        }

        .stats-bar {
          gap: 12px;
        }

        .stat {
          min-width: calc(50% - 6px);
        }

        .filters {
          gap: 12px;
        }

        .separator {
          display: none;
        }

        .toolbar-actions,
        .result-count {
          margin-left: 0;
        }
      }

      @media (max-width: 560px) {
        .stat {
          min-width: 100%;
        }

        input[type="text"],
        input[type="date"] {
          width: 100%;
        }

        .filter-group {
          width: 100%;
          flex-wrap: wrap;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <div class="header-left">
        <h1>Analyse VDL</h1>
        <p id="last-update">Chargement des donnees...</p>
      </div>
      <div class="status-pill">Dashboard actif</div>
    </header>

    <main class="page">
      <section class="stats-bar" id="summary-cards"></section>

      <section class="filters">
        <div class="filter-group">
          <span class="filter-label">Recherche</span>
          <input type="text" id="filter-search" placeholder="Texte libre...">
        </div>
        <div class="separator"></div>
        <div class="filter-group">
          <span class="filter-label">Source</span>
          <input type="text" id="filter-source" placeholder="Domaine source">
        </div>
        <div class="filter-group">
          <span class="filter-label">Cible</span>
          <input type="text" id="filter-target" placeholder="Domaine cible">
        </div>
        <div class="filter-group">
          <span class="filter-label">Ancre</span>
          <input type="text" id="filter-anchor" placeholder="Texte d'ancre">
        </div>
        <div class="separator"></div>
        <div class="filter-group">
          <span class="filter-label">Du</span>
          <input type="date" id="filter-date-from">
          <span class="filter-label">Au</span>
          <input type="date" id="filter-date-to">
        </div>
        <div class="separator"></div>
        <button class="btn" id="reset-filters-btn">Reinitialiser</button>
      </section>

      <section class="tabs" id="tabs"></section>

      <section class="panel">
        <div class="panel-header">
          <div>
            <h2 id="view-title">Chargement...</h2>
            <p id="view-description">Initialisation du tableau...</p>
          </div>
          <span class="result-count" id="result-count"></span>
        </div>

        <div class="table-toolbar">
          <span class="toolbar-label">Colonnes</span>
          <div class="col-toggle-bar" id="col-toggle-bar"></div>
          <div class="toolbar-actions">
            <button class="btn" id="clear-column-filters-btn">Effacer filtres de colonnes</button>
            <button class="dl-btn" id="export-btn">Exporter CSV</button>
          </div>
        </div>

        <div class="active-filters-bar" id="active-filters-bar"></div>

        <div class="table-outer">
          <div class="table-wrap">
            <table>
              <thead id="table-head"></thead>
              <tbody id="table-body"></tbody>
            </table>
          </div>
        </div>

        <div class="load-more-wrap" id="load-more-wrap">
          <div class="rows-info" id="rows-info"></div>
          <button class="load-more-btn" id="load-more-btn">Charger plus</button>
        </div>
      </section>
    </main>

    <div id="col-filter-dropdown">
      <div class="cfd-header">
        <div class="cfd-col-name" id="cfd-col-name">Colonne</div>
        <input type="text" class="cfd-search" id="cfd-search" placeholder="Rechercher...">
      </div>
      <div class="cfd-mode-bar">
        <button class="cfd-mode-btn active" id="cfd-mode-values">Valeurs</button>
        <button class="cfd-mode-btn" id="cfd-mode-include">Contient</button>
        <button class="cfd-mode-btn" id="cfd-mode-exclude">Exclut</button>
        <button class="cfd-mode-btn" id="cfd-mode-between">Entre</button>
      </div>
      <div class="cfd-list" id="cfd-list"></div>
      <div class="cfd-text-input" id="cfd-text-input">
        <input type="text" id="cfd-text-value" placeholder="Valeur...">
      </div>
      <div class="cfd-range" id="cfd-range">
        <input type="number" id="cfd-range-min" placeholder="Min">
        <span>-</span>
        <input type="number" id="cfd-range-max" placeholder="Max">
      </div>
      <div class="cfd-footer">
        <button id="cfd-select-all-btn">Tout</button>
        <button id="cfd-clear-all-btn">Aucun</button>
        <button id="cfd-close-btn">Fermer</button>
      </div>
    </div>

    <script>
      const BATCH_SIZE = 100;

      const state = {
        meta: null,
        datasets: {},
        activeView: "sellers",
        globalFilters: {

      function getViewState(viewKey) {
        if (!state.viewState[viewKey]) {
          const viewConfig = VIEW_CONFIGS[viewKey];
          const defaultSort = viewConfig.defaultSort || viewConfig.columns[0]?.key || "";
          state.viewState[viewKey] = {
            colFilters: {},
            hiddenCols: new Set(),
            sortCol: defaultSort,
            sortDir: viewConfig.defaultSortDir || 1,
            filteredRows: [],
            shownCount: 0,
          };
        }
        return state.viewState[viewKey];
      }

      function activeConfig() {
        return VIEW_CONFIGS[state.activeView];
      }

      function activeRows() {
        return state.datasets[state.activeView] || [];
      }

      function activeViewState() {
        return getViewState(state.activeView);
      }

      function escapeHtml(value) {
        return String(value ?? "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      function normalizeText(value) {
        return String(value ?? "").replace(/\s+/g, " ").trim();
      }

      function parseMetricNumber(value) {
        const raw = normalizeText(value);
        if (!raw || raw === "-" || raw.toLowerCase() === "n/a") {
          return Number.NaN;
        }
        let cleaned = raw.replace(/[€%]/g, "").replace(/\s/g, "");
        if (cleaned.includes(",") && cleaned.includes(".")) {
          cleaned = cleaned.replace(/,/g, "");
        } else if (cleaned.includes(",") && !cleaned.includes(".")) {
          cleaned = cleaned.replace(/,/g, ".");
        }
        cleaned = cleaned.replace(/[^\d.-]/g, "");
        const parsed = Number.parseFloat(cleaned);
        return Number.isFinite(parsed) ? parsed : Number.NaN;
      }

      function formatCompactNumber(value) {
        if (!Number.isFinite(value)) {
          return "-";
        }
        return new Intl.NumberFormat("fr-FR").format(value);
      }

      function highlight(value, terms) {
        let output = escapeHtml(value);
        for (const term of terms.filter(Boolean)) {
          const escaped = term.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
          output = output.replace(new RegExp("(" + escaped + ")", "ig"), "<mark>$1</mark>");
        }
        return output;
      }

      function normalizeDate(value) {
        const text = normalizeText(value);
        return /^\d{4}-\d{2}-\d{2}$/.test(text) ? text : "";
      }

      function formatDate(value) {
        const date = normalizeDate(value);
        if (!date) {
          return value || "-";
        }
        const [year, month, day] = date.split("-");
        return day + "/" + month + "/" + year;
      }

      function objectHasDateInRange(row, dateKeys, from, to) {
        if (!dateKeys.length) {
          return true;
        }
        if (dateKeys.length === 1) {
          const value = normalizeDate(row[dateKeys[0]]);
          if (!value) {
            return false;
          }
          if (from && value < from) {
            return false;
          }
          if (to && value > to) {
            return false;
          }
          return true;
        }

        const start = normalizeDate(row[dateKeys[0]]);
        const end = normalizeDate(row[dateKeys[1]]) || start;
        if (!start && !end) {
          return false;
        }
        const intervalStart = start || end;
        const intervalEnd = end || start;
        if (from && intervalEnd < from) {
          return false;
        }
        if (to && intervalStart > to) {
          return false;
        }
        return true;
      }

      function rowStringValues(row, config) {
        return config.columns.map((column) => normalizeText(displayValue(row, column)));
      }

      function displayValue(row, column) {
        const value = row[column.key];
        if (column.type === "date") {
          return formatDate(value);
        }
        if (Array.isArray(value)) {
          return value.join(", ");
        }
        return value ?? "";
      }

      function rawFilterValue(row, column) {
        const value = row[column.key];
        if (Array.isArray(value)) {
          return value.join(", ");
        }
        return value ?? "";
      }

      function sortValue(row, column) {
        const value = row[column.key];
        if (column.type === "number") {
          const parsed = parseMetricNumber(value);
          return Number.isNaN(parsed) ? Number.NEGATIVE_INFINITY : parsed;
        }
        if (column.type === "date") {
          return normalizeDate(value);
        }
        if (Array.isArray(value)) {
          return value.join(", ").toLowerCase();
        }
        return normalizeText(value).toLowerCase();
      }

      function fetchJson(path) {
        return fetch(path, { cache: "no-store" }).then((response) => {
          if (!response.ok) {
            throw new Error("Impossible de charger " + path);
          }
          return response.json();
        });
      }

      function readCatalogValue(row, keys) {
        for (const key of keys) {
          if (row[key] !== undefined) {
            return row[key];
          }
        }
        return "";
      }

      function buildDatasets(payload) {
        state.meta = payload.meta;

        state.datasets.sellers = payload.sellers.map((row) => ({
          domain: row.domain || "",
          articles_analyzed: row.articles_analyzed ?? 0,
          articles_with_external_links: row.articles_with_external_links ?? 0,
          raw_outgoing_links_count: row.raw_outgoing_links_count ?? 0,
          unique_target_domains_count: row.unique_target_domains_count ?? 0,
          visits: readCatalogValue(row, ["Visites"]),
          traffic_google: readCatalogValue(row, ["Trafic Google"]),
          tf: readCatalogValue(row, ["TF"]),
          rd: readCatalogValue(row, ["RD"]),
          da: readCatalogValue(row, ["DA"]),
          category: readCatalogValue(row, ["Categorie", "Catégorie", "CatÃ©gorie"]),
          language: readCatalogValue(row, ["Langue"]),
        }));

        state.datasets.buyers = payload.buyers.map((row) => ({
          domain: row.domain || "",
          links_received_raw: row.links_received_raw ?? 0,
          seller_domains_count: row.seller_domains_count ?? 0,
          articles_count: row.articles_count ?? 0,
          visits: readCatalogValue(row, ["Visites"]),
          traffic_google: readCatalogValue(row, ["Trafic Google"]),
          tf: readCatalogValue(row, ["TF"]),
          rd: readCatalogValue(row, ["RD"]),
          da: readCatalogValue(row, ["DA"]),
          category: readCatalogValue(row, ["Categorie", "Catégorie", "CatÃ©gorie"]),
          language: readCatalogValue(row, ["Langue"]),
        }));

        state.datasets.links = payload.links.map((row) => ({
          detected_on: row.detected_on || "",
          source_domain: row.source_domain || "",
          source_url: row.source_url || "",
          target_domain: row.target_domain || "",
          target_url: row.target_url || "",
          anchor_text: row.anchor_text || "",
          rel_flags: Array.isArray(row.rel_flags) ? row.rel_flags.join(", ") : "",
        }));

        state.datasets.edges = payload.edges.map((row) => ({
          source_domain: row.source_domain || "",
          target_domain: row.target_domain || "",
          links_count: row.links_count ?? 0,
          articles_count: row.articles_count ?? 0,
          first_seen: row.first_seen || "",
          last_seen: row.last_seen || "",
        }));
      }

      function renderSummaryCards() {
        const meta = state.meta || {};
        const linkRows = state.datasets.links || [];
        const sourceCount = new Set(linkRows.map((row) => row.source_domain).filter(Boolean)).size;
        const targetCount = new Set(linkRows.map((row) => row.target_domain).filter(Boolean)).size;
        const cards = [
          ["Sites vendeurs suivis", meta.seller_count ?? 0, "blue"],
          ["Domaines receveurs detectes", meta.buyer_count ?? 0, "green"],
          ["Pages analysees", meta.page_events_count ?? 0, "yellow"],
          ["Liens sortants detectes", meta.link_events_count ?? 0, "red"],
          ["Sources visibles dans les liens", sourceCount, "blue"],
          ["Cibles visibles dans les liens", targetCount, "green"],
        ];

        const container = document.getElementById("summary-cards");
        container.innerHTML = cards
          .map(
            ([label, value, tone]) => `
              <article class="stat">
                <div class="stat-label">${escapeHtml(label)}</div>
                <div class="stat-value ${tone}">${escapeHtml(formatCompactNumber(Number(value)))}</div>
              </article>
            `,
          )
          .join("");

        document.getElementById("last-update").textContent =
          "Derniere generation : " + (meta.generated_on || "-");
      }

      function renderTabs() {
        const container = document.getElementById("tabs");
        container.innerHTML = Object.entries(VIEW_CONFIGS)
          .map(
            ([viewKey, config]) => `
              <div class="tab ${viewKey === state.activeView ? "active" : ""}" data-view="${viewKey}">
                ${escapeHtml(config.title)}
              </div>
            `,
          )
          .join("");

        container.querySelectorAll(".tab").forEach((tab) => {
          tab.addEventListener("click", () => {
            state.activeView = tab.dataset.view;
            renderTabs();
            syncTopFiltersWithView();
            applyFilters();
          });
        });
      }

      function syncTopFiltersWithView() {
        const config = activeConfig();
        const sourceInput = document.getElementById("filter-source");
        const targetInput = document.getElementById("filter-target");
        const anchorInput = document.getElementById("filter-anchor");
        const dateFromInput = document.getElementById("filter-date-from");
        const dateToInput = document.getElementById("filter-date-to");

        sourceInput.disabled = !config.sourceKey;
        targetInput.disabled = !config.targetKey;
        anchorInput.disabled = !config.anchorKey;
        dateFromInput.disabled = !config.dateKeys.length;
        dateToInput.disabled = !config.dateKeys.length;

        sourceInput.placeholder = config.sourceKey ? "Domaine source" : "Non applicable";
        targetInput.placeholder = config.targetKey ? "Domaine cible" : "Non applicable";
        anchorInput.placeholder = config.anchorKey ? "Texte d'ancre" : "Non applicable";
      }

      function renderViewHeader() {
        const config = activeConfig();
        document.getElementById("view-title").textContent = config.title;
        document.getElementById("view-description").textContent = config.description;
      }

      function matchesTopFilters(row, config) {
        const filters = state.globalFilters;
        const search = filters.search.toLowerCase();
        if (search) {
          const haystack = rowStringValues(row, config).join(" ").toLowerCase();
          if (!haystack.includes(search)) {
            return false;
          }
        }

        if (filters.source && config.sourceKey) {
          const value = normalizeText(row[config.sourceKey]).toLowerCase();
          if (!value.includes(filters.source.toLowerCase())) {
            return false;
          }
        }

        if (filters.target && config.targetKey) {
          const value = normalizeText(row[config.targetKey]).toLowerCase();
          if (!value.includes(filters.target.toLowerCase())) {
            return false;
          }
        }

        if (filters.anchor && config.anchorKey) {
          const value = normalizeText(row[config.anchorKey]).toLowerCase();
          if (!value.includes(filters.anchor.toLowerCase())) {
            return false;
          }
        }

        if (!objectHasDateInRange(row, config.dateKeys, filters.dateFrom, filters.dateTo)) {
          return false;
        }

        return true;
      }

      function matchesColumnFilters(row, config, viewState) {
        for (const column of config.columns) {
          const filter = viewState.colFilters[column.key];
          if (!filter) {
            continue;
          }

          const rawValue = normalizeText(rawFilterValue(row, column));
          if (filter.mode === "values") {
            if (!filter.values || !filter.values.size) {
              continue;
            }
            if (!filter.values.has(rawValue)) {
              return false;
            }
            continue;
          }

          if (filter.mode === "include") {
            if (filter.text && !rawValue.toLowerCase().includes(filter.text.toLowerCase())) {
              return false;
            }
            continue;
          }

          if (filter.mode === "exclude") {
            if (filter.text && rawValue.toLowerCase().includes(filter.text.toLowerCase())) {
              return false;
            }
            continue;
          }

          if (filter.mode === "between") {
            const numericValue = sortValue(row, column);
            const min = parseMetricNumber(filter.min);
            const max = parseMetricNumber(filter.max);
            if (!Number.isFinite(numericValue)) {
              return false;
            }
            if (Number.isFinite(min) && numericValue < min) {
              return false;
            }
            if (Number.isFinite(max) && numericValue > max) {
              return false;
            }
          }
        }

        return true;
      }

      function sortRows(rows, config, viewState) {
        const column = config.columns.find((item) => item.key === viewState.sortCol) || config.columns[0];
        if (!column) {
          return rows;
        }
        rows.sort((left, right) => {
          const a = sortValue(left, column);
          const b = sortValue(right, column);
          if (column.type === "number") {
            return (a - b) * viewState.sortDir;
          }
          return String(a).localeCompare(String(b), "fr", { sensitivity: "base" }) * viewState.sortDir;
        });
        return rows;
      }

      function applyFilters() {
        const config = activeConfig();
        const viewState = activeViewState();
        const rows = activeRows()
          .filter((row) => matchesTopFilters(row, config))
          .filter((row) => matchesColumnFilters(row, config, viewState));

        sortRows(rows, config, viewState);

        viewState.filteredRows = rows;
        viewState.shownCount = Math.min(BATCH_SIZE, rows.length);

        renderViewHeader();
        renderColumnToggleBar();
        renderActiveFilterPills();
        renderTable();
      }

      function visibleColumns() {
        const config = activeConfig();
        const hidden = activeViewState().hiddenCols;
        return config.columns.filter((column) => !hidden.has(column.key));
      }

      function renderColumnToggleBar() {
        const viewState = activeViewState();
        const container = document.getElementById("col-toggle-bar");
        container.innerHTML = activeConfig().columns
          .map((column) => {
            const hidden = viewState.hiddenCols.has(column.key);
            return `
              <button class="col-toggle-btn ${hidden ? "hidden" : ""}" data-column="${column.key}">
                ${escapeHtml(column.label)}
              </button>
            `;
          })
          .join("");

        container.querySelectorAll(".col-toggle-btn").forEach((button) => {
          button.addEventListener("click", () => {
            const key = button.dataset.column;
            if (viewState.hiddenCols.has(key)) {
              viewState.hiddenCols.delete(key);
            } else {
              viewState.hiddenCols.add(key);
            }
            renderColumnToggleBar();
            renderTable();
          });
        });
      }

      function filterSummaryPills() {
        const pills = [];
        const filters = state.globalFilters;

        if (filters.search) {
          pills.push({ type: "global", key: "search", label: "Recherche", value: filters.search });
        }
        if (filters.source && activeConfig().sourceKey) {
          pills.push({ type: "global", key: "source", label: "Source", value: filters.source });
        }
        if (filters.target && activeConfig().targetKey) {
          pills.push({ type: "global", key: "target", label: "Cible", value: filters.target });
        }
        if (filters.anchor && activeConfig().anchorKey) {
          pills.push({ type: "global", key: "anchor", label: "Ancre", value: filters.anchor });
        }
        if ((filters.dateFrom || filters.dateTo) && activeConfig().dateKeys.length) {
          pills.push({
            type: "global",
            key: "date",
            label: "Dates",
            value: (filters.dateFrom || "-") + " -> " + (filters.dateTo || "-"),
          });
        }

        const viewState = activeViewState();
        for (const column of activeConfig().columns) {
          const filter = viewState.colFilters[column.key];
          if (!filter) {
            continue;
          }
          if (filter.mode === "values" && filter.values && filter.values.size) {
            pills.push({
              type: "column",
              key: column.key,
              label: column.label,
              value: filter.values.size + " valeur(s)",
            });
          } else if ((filter.mode === "include" || filter.mode === "exclude") && filter.text) {
            pills.push({
              type: "column",
              key: column.key,
              label: column.label,
              value: (filter.mode === "include" ? "contient " : "exclut ") + '"' + filter.text + '"',
            });
          } else if (filter.mode === "between" && (filter.min || filter.max)) {
            pills.push({
              type: "column",
              key: column.key,
              label: column.label,
              value: "entre " + (filter.min || "-") + " et " + (filter.max || "-"),
            });
          }
        }

        return pills;
      }

      function renderActiveFilterPills() {
        const container = document.getElementById("active-filters-bar");
        const pills = filterSummaryPills();

        if (!pills.length) {
          container.classList.remove("visible");
          container.innerHTML = "";
          return;
        }

        container.classList.add("visible");
        container.innerHTML = `
          <span class="filters-label">Filtres actifs :</span>
          ${pills
            .map(
              (pill) => `
                <span class="filter-pill">
                  ${escapeHtml(pill.label)}: ${escapeHtml(pill.value)}
                  <button class="filter-pill-remove" data-type="${pill.type}" data-key="${pill.key}">x</button>
                </span>
              `,
            )
            .join("")}
        `;

        container.querySelectorAll(".filter-pill-remove").forEach((button) => {
          button.addEventListener("click", () => {
            if (button.dataset.type === "global") {
              if (button.dataset.key === "date") {
                updateTopFilter("dateFrom", "");
                updateTopFilter("dateTo", "");
                document.getElementById("filter-date-from").value = "";
                document.getElementById("filter-date-to").value = "";
              } else {
                updateTopFilter(button.dataset.key, "");
                document.getElementById("filter-" + button.dataset.key).value = "";
              }
            } else {
              delete activeViewState().colFilters[button.dataset.key];
            }
            applyFilters();
          });
        });
      }

      function tableCellHtml(row, column) {
        const globalTerms = [
          state.globalFilters.search,
          column.key === activeConfig().sourceKey ? state.globalFilters.source : "",
          column.key === activeConfig().targetKey ? state.globalFilters.target : "",
          column.key === activeConfig().anchorKey ? state.globalFilters.anchor : "",
        ].filter(Boolean);

        const value = displayValue(row, column);
        const className = column.type === "number" ? "num" : "";

        if (column.type === "url") {
          const url = normalizeText(row[column.key]);
          return `<td class="td-url ${className}" title="${escapeHtml(url)}"><a href="${escapeHtml(url)}" target="_blank" rel="noreferrer">${highlight(url, globalTerms)}</a></td>`;
        }

        if (column.type === "date") {
          return `<td class="${className}">${escapeHtml(value || "-")}</td>`;
        }

        return `<td class="${className}" title="${escapeHtml(value)}">${highlight(value || "-", globalTerms)}</td>`;
      }

      function renderTableHead() {
        const config = activeConfig();
        const viewState = activeViewState();
        const head = document.getElementById("table-head");

        head.innerHTML = `
          <tr>
            ${visibleColumns()
              .map((column) => {
                const filter = viewState.colFilters[column.key];
                const isActiveFilter =
                  filter &&
                  ((filter.mode === "values" && filter.values && filter.values.size) ||
                    ((filter.mode === "include" || filter.mode === "exclude") && filter.text) ||
                    (filter.mode === "between" && (filter.min || filter.max)));

                let indicator = "";
                if (isActiveFilter && filter.mode === "values") {
                  indicator = `<span class="filter-indicator">${filter.values.size}</span>`;
                } else if (isActiveFilter) {
                  indicator = `<span class="filter-indicator">!</span>`;
                }

                const sortClass =
                  viewState.sortCol === column.key ? (viewState.sortDir === 1 ? "asc" : "desc") : "";

                return `
                  <th class="${sortClass}">
                    <div class="th-inner">
                      <div class="th-sort" data-column="${column.key}">
                        ${escapeHtml(column.label)}
                        <span class="sort-arrow"></span>
                      </div>
                      <button class="th-filter-trigger ${isActiveFilter ? "active" : ""}" data-column="${column.key}">
                        Filtrer ${indicator}
                      </button>
                    </div>
                  </th>
                `;
              })
              .join("")}
          </tr>
        `;

        head.querySelectorAll(".th-sort").forEach((node) => {
          node.addEventListener("click", () => {
            const key = node.dataset.column;
            if (viewState.sortCol === key) {
              viewState.sortDir *= -1;
            } else {
              viewState.sortCol = key;
              viewState.sortDir = 1;
            }
            applyFilters();
          });
        });

        head.querySelectorAll(".th-filter-trigger").forEach((button) => {
          button.addEventListener("click", (event) => {
            event.stopPropagation();
            openFilterDropdown(button.dataset.column, button);
          });
        });
      }

      function renderTableBody() {
        const body = document.getElementById("table-body");
        const config = activeConfig();
        const viewState = activeViewState();
        const rows = viewState.filteredRows;
        const count = viewState.shownCount;

        if (!rows.length) {
          body.innerHTML = `
            <tr>
              <td colspan="${Math.max(visibleColumns().length, 1)}">
                <div class="empty">${escapeHtml(config.emptyMessage)}</div>
              </td>
            </tr>
          `;
          return;
        }

        body.innerHTML = rows
          .slice(0, count)
          .map(
            (row) => `
              <tr>
                ${visibleColumns().map((column) => tableCellHtml(row, column)).join("")}
              </tr>
            `,
          )
          .join("");
      }

      function renderResultCount() {
        const viewState = activeViewState();
        document.getElementById("result-count").innerHTML =
          "<strong>" + viewState.filteredRows.length + "</strong> ligne(s)";
      }

      function renderLoadMore() {
        const wrap = document.getElementById("load-more-wrap");
        const info = document.getElementById("rows-info");
        const button = document.getElementById("load-more-btn");
        const viewState = activeViewState();

        if (viewState.filteredRows.length <= BATCH_SIZE) {
          wrap.style.display = "none";
          return;
        }

        wrap.style.display = "block";
        info.textContent = viewState.shownCount + " / " + viewState.filteredRows.length + " lignes affichees";
        button.style.display = viewState.shownCount >= viewState.filteredRows.length ? "none" : "inline-flex";
      }

      function renderTable() {
        renderTableHead();
        renderTableBody();
        renderResultCount();
        renderLoadMore();
      }

      function uniqueValuesForColumn(viewKey, columnKey) {
        const column = VIEW_CONFIGS[viewKey].columns.find((item) => item.key === columnKey);
        if (!column) {
          return [];
        }
        return [...new Set((state.datasets[viewKey] || []).map((row) => normalizeText(rawFilterValue(row, column))).filter(Boolean))]
          .sort((left, right) => left.localeCompare(right, "fr", { sensitivity: "base" }));
      }

      function currentDropdownFilter() {
        if (!state.dropdown.view || !state.dropdown.columnKey) {
          return null;
        }
        const viewState = getViewState(state.dropdown.view);
        return viewState.colFilters[state.dropdown.columnKey] || null;
      }

      function ensureDropdownFilter() {
        if (!state.dropdown.view || !state.dropdown.columnKey) {
          return null;
        }
        const viewState = getViewState(state.dropdown.view);
        if (!viewState.colFilters[state.dropdown.columnKey]) {
          viewState.colFilters[state.dropdown.columnKey] = {
            mode: state.dropdown.mode,
            text: "",
            values: new Set(),
            min: "",
            max: "",
          };
        }
        return viewState.colFilters[state.dropdown.columnKey];
      }

      function openFilterDropdown(columnKey, trigger) {
        state.dropdown.view = state.activeView;
        state.dropdown.columnKey = columnKey;

        const dropdown = document.getElementById("col-filter-dropdown");
        const config = VIEW_CONFIGS[state.activeView];
        const column = config.columns.find((item) => item.key === columnKey);
        const filter = currentDropdownFilter();

        document.getElementById("cfd-col-name").textContent = column.label;
        document.getElementById("cfd-search").value = "";

        const betweenButton = document.getElementById("cfd-mode-between");
        betweenButton.classList.toggle("hidden", column.type !== "number");

        const defaultMode = filter?.mode || (column.type === "number" ? "between" : "values");
        setDropdownMode(column.type !== "number" && defaultMode === "between" ? "values" : defaultMode, false);

        const rect = trigger.getBoundingClientRect();
        dropdown.style.top = rect.bottom + window.scrollY + 4 + "px";
        dropdown.style.left = Math.min(rect.left + window.scrollX, window.innerWidth - 280) + "px";
        dropdown.classList.add("open");
        renderDropdownContents();
      }

      function closeDropdown() {
        document.getElementById("col-filter-dropdown").classList.remove("open");
        state.dropdown.view = null;
        state.dropdown.columnKey = null;
      }

      function setDropdownMode(mode, apply) {
        state.dropdown.mode = mode;
        ["values", "include", "exclude", "between"].forEach((key) => {
          document.getElementById("cfd-mode-" + key).classList.toggle("active", key === mode);
        });

        document.getElementById("cfd-list").style.display = mode === "values" ? "block" : "none";
        document.getElementById("cfd-text-input").classList.toggle("visible", mode === "include" || mode === "exclude");
        document.getElementById("cfd-range").classList.toggle("visible", mode === "between");

        const filter = ensureDropdownFilter();
        if (filter) {
          filter.mode = mode;
        }

        if (apply && state.dropdown.view === state.activeView) {
          applyFilters();
        }
      }

      function renderDropdownContents() {
        const filter = ensureDropdownFilter();
        const search = document.getElementById("cfd-search").value.toLowerCase();
        const list = document.getElementById("cfd-list");
        const textValue = document.getElementById("cfd-text-value");
        const rangeMin = document.getElementById("cfd-range-min");
        const rangeMax = document.getElementById("cfd-range-max");

        if (!filter) {
          return;
        }

        textValue.value = filter.text || "";
        rangeMin.value = filter.min || "";
        rangeMax.value = filter.max || "";

        if (state.dropdown.mode === "values") {
          const values = uniqueValuesForColumn(state.dropdown.view, state.dropdown.columnKey).filter((value) =>
            value.toLowerCase().includes(search),
          );
          const allChecked = values.length > 0 && values.every((value) => filter.values && filter.values.has(value));

          if (!values.length) {
            list.innerHTML = `<div class="cfd-item"><span class="cfd-item-label">Aucune valeur</span></div>`;
            return;
          }

          list.innerHTML = `
            <div class="cfd-item select-all" data-role="select-all">
              <input type="checkbox" ${allChecked ? "checked" : ""}>
              <span class="cfd-item-label">Tout selectionner</span>
            </div>
            ${values
              .map(
                (value) => `
                  <div class="cfd-item" data-value="${escapeHtml(value)}">
                    <input type="checkbox" ${filter.values && filter.values.has(value) ? "checked" : ""}>
                    <span class="cfd-item-label" title="${escapeHtml(value)}">${escapeHtml(value)}</span>
                  </div>
                `,
              )
              .join("")}
          `;

          list.querySelector('[data-role="select-all"]').addEventListener("click", () => {
            values.forEach((value) => filter.values.add(value));
            renderDropdownContents();
            if (state.dropdown.view === state.activeView) {
              applyFilters();
            }
          });

          list.querySelectorAll("[data-value]").forEach((item) => {
            item.addEventListener("click", () => {
              const value = item.dataset.value;
              if (filter.values.has(value)) {
                filter.values.delete(value);
              } else {
                filter.values.add(value);
              }
              if (!filter.values.size) {
                delete getViewState(state.dropdown.view).colFilters[state.dropdown.columnKey];
              }
              renderDropdownContents();
              if (state.dropdown.view === state.activeView) {
                applyFilters();
              }
            });
          });
        }
      }

      function clearColumnFiltersForActiveView() {
        activeViewState().colFilters = {};
        applyFilters();
      }

      function resetAllFilters() {
        state.globalFilters = {
          search: "",
          source: "",
          target: "",
          anchor: "",
          dateFrom: "",
          dateTo: "",
        };
        document.getElementById("filter-search").value = "";
        document.getElementById("filter-source").value = "";
        document.getElementById("filter-target").value = "";
        document.getElementById("filter-anchor").value = "";
        document.getElementById("filter-date-from").value = "";
        document.getElementById("filter-date-to").value = "";
        clearColumnFiltersForActiveView();
      }

      function updateTopFilter(key, value) {
        state.globalFilters[key] = value;
      }

      function exportCsv() {
        const columns = visibleColumns();
        const rows = activeViewState().filteredRows;
        if (!rows.length) {
          return;
        }

        const header = columns.map((column) => '"' + String(column.label).replace(/"/g, '""') + '"').join(",");
        const lines = rows.map((row) =>
          columns
            .map((column) => '"' + String(displayValue(row, column)).replace(/"/g, '""') + '"')
            .join(","),
        );
        const csv = [header].concat(lines).join("\n");
        const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = "analyse-vdl-" + state.activeView + ".csv";
        link.click();
        URL.revokeObjectURL(url);
      }

      function bindStaticEvents() {
        document.getElementById("filter-search").addEventListener("input", (event) => {
          updateTopFilter("search", event.target.value.trim());
          applyFilters();
        });
        document.getElementById("filter-source").addEventListener("input", (event) => {
          updateTopFilter("source", event.target.value.trim());
          applyFilters();
        });
        document.getElementById("filter-target").addEventListener("input", (event) => {
          updateTopFilter("target", event.target.value.trim());
          applyFilters();
        });
        document.getElementById("filter-anchor").addEventListener("input", (event) => {
          updateTopFilter("anchor", event.target.value.trim());
          applyFilters();
        });
        document.getElementById("filter-date-from").addEventListener("change", (event) => {
          updateTopFilter("dateFrom", event.target.value);
          applyFilters();
        });
        document.getElementById("filter-date-to").addEventListener("change", (event) => {
          updateTopFilter("dateTo", event.target.value);
          applyFilters();
        });
        document.getElementById("reset-filters-btn").addEventListener("click", resetAllFilters);
        document.getElementById("clear-column-filters-btn").addEventListener("click", clearColumnFiltersForActiveView);
        document.getElementById("export-btn").addEventListener("click", exportCsv);
        document.getElementById("load-more-btn").addEventListener("click", () => {
          const viewState = activeViewState();
          viewState.shownCount = Math.min(viewState.shownCount + BATCH_SIZE, viewState.filteredRows.length);
          renderTable();
        });

        document.getElementById("cfd-mode-values").addEventListener("click", () => setDropdownMode("values", false));
        document.getElementById("cfd-mode-include").addEventListener("click", () => setDropdownMode("include", false));
        document.getElementById("cfd-mode-exclude").addEventListener("click", () => setDropdownMode("exclude", false));
        document.getElementById("cfd-mode-between").addEventListener("click", () => setDropdownMode("between", false));

        document.getElementById("cfd-search").addEventListener("input", renderDropdownContents);
        document.getElementById("cfd-text-value").addEventListener("input", (event) => {
          const filter = ensureDropdownFilter();
          if (!filter) {
            return;
          }
          filter.text = event.target.value.trim();
          if (!filter.text) {
            delete getViewState(state.dropdown.view).colFilters[state.dropdown.columnKey];
          }
          if (state.dropdown.view === state.activeView) {
            applyFilters();
          }
        });
        document.getElementById("cfd-range-min").addEventListener("input", (event) => {
          const filter = ensureDropdownFilter();
          if (!filter) {
            return;
          }
          filter.min = event.target.value.trim();
          if (!filter.min && !filter.max) {
            delete getViewState(state.dropdown.view).colFilters[state.dropdown.columnKey];
          }
          if (state.dropdown.view === state.activeView) {
            applyFilters();
          }
        });
        document.getElementById("cfd-range-max").addEventListener("input", (event) => {
          const filter = ensureDropdownFilter();
          if (!filter) {
            return;
          }
          filter.max = event.target.value.trim();
          if (!filter.min && !filter.max) {
            delete getViewState(state.dropdown.view).colFilters[state.dropdown.columnKey];
          }
          if (state.dropdown.view === state.activeView) {
            applyFilters();
          }
        });

        document.getElementById("cfd-select-all-btn").addEventListener("click", () => {
          const filter = ensureDropdownFilter();
          if (!filter || state.dropdown.mode !== "values") {
            return;
          }
          uniqueValuesForColumn(state.dropdown.view, state.dropdown.columnKey)
            .filter((value) => value.toLowerCase().includes(document.getElementById("cfd-search").value.toLowerCase()))
            .forEach((value) => filter.values.add(value));
          renderDropdownContents();
          if (state.dropdown.view === state.activeView) {
            applyFilters();
          }
        });
        document.getElementById("cfd-clear-all-btn").addEventListener("click", () => {
          if (!state.dropdown.view || !state.dropdown.columnKey) {
            return;
          }
          delete getViewState(state.dropdown.view).colFilters[state.dropdown.columnKey];
          renderDropdownContents();
          if (state.dropdown.view === state.activeView) {
            applyFilters();
          }
        });
        document.getElementById("cfd-close-btn").addEventListener("click", closeDropdown);

        document.addEventListener("click", (event) => {
          const dropdown = document.getElementById("col-filter-dropdown");
          if (
            dropdown.classList.contains("open") &&
            !dropdown.contains(event.target) &&
            !event.target.closest(".th-filter-trigger")
          ) {
            closeDropdown();
          }
        });
      }

      function showError(message) {
        document.getElementById("view-title").textContent = "Erreur de chargement";
        document.getElementById("view-description").textContent = "Impossible d'initialiser le dashboard.";
        document.getElementById("result-count").textContent = "";
        document.getElementById("col-toggle-bar").innerHTML = "";
        document.getElementById("active-filters-bar").classList.remove("visible");
        document.getElementById("active-filters-bar").innerHTML = "";
        document.getElementById("table-head").innerHTML = "";
        document.getElementById("table-body").innerHTML = `
          <tr>
            <td colspan="1">
              <div class="error-box">
                <strong>Erreur</strong>
                <span>${escapeHtml(message)}</span>
              </div>
            </td>
          </tr>
        `;
        document.getElementById("load-more-wrap").style.display = "none";
      }

      async function loadData() {
        try {
          const [meta, sellers, buyers, links, edges] = await Promise.all([
            fetchJson("./data/build_meta.json"),
            fetchJson("./data/sellers_summary.json"),
            fetchJson("./data/buyers_summary.json"),
            fetchJson("./data/links_recent.json"),
            fetchJson("./data/network_edges.json"),
          ]);

          buildDatasets({ meta, sellers, buyers, links, edges });
          renderSummaryCards();
          renderTabs();
          syncTopFiltersWithView();
          applyFilters();
        } catch (error) {
          showError(error.message);
        }
      }

      bindStaticEvents();
      loadData();
    </script>
  </body>
</html>
